backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/kuja-website
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:

  - name: "honorboard"
    label: "Honor Board"
    folder: "people/honorboard"
    create: true
    slug: "{{year}}"
    fields:
      - { label: "Year", name: "year", widget: "string" }
      - { label: "President Name", name: "president_name", widget: "string" }
      - { label: "President Photo", name: "president_photo", widget: "image" }
      - { label: "President Profile", name: "president_profile", widget: "relation", collection: "profiles", search_fields: ["name"], value_field: "slug", display_fields: ["name"] }

      - { label: "GS Name", name: "gs_name", widget: "string" }
      - { label: "GS Photo", name: "gs_photo", widget: "image" }
      - { label: "GS Profile", name: "gs_profile", widget: "relation", collection: "profiles", search_fields: ["name"], value_field: "slug", display_fields: ["name"] }

  - name: "currentmembers"
    label: "Current Members"
    folder: "people/current"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Position", name: "position", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Profile", name: "profile", widget: "relation", collection: "profiles", search_fields: ["name"], value_field: "slug", display_fields: ["name"] }

  - name: "profiles"
    label: "Profiles"
    folder: "people/profiles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Address", name: "address", widget: "string" }
      - { label: "Contact", name: "contact", widget: "string" }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "University Details", name: "university", widget: "markdown" }
      - { label: "Education", name: "education", widget: "markdown" }
      - { label: "Bio", name: "bio", widget: "markdown" }

  - name: "news"
    label: "News"
    folder: "news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Gallery"
    folder: "gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About Page"
        name: "about"
        file: "about.html"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }
