<script>
function showHonor() {
  document.getElementById("honorBoard").style.display = "block";
  document.getElementById("currentMembers").style.display = "none";
  document.getElementById("honorBtn").classList.add("active");
  document.getElementById("currentBtn").classList.remove("active");
}

function showCurrent() {
  document.getElementById("honorBoard").style.display = "none";
  document.getElementById("currentMembers").style.display = "block";
  document.getElementById("honorBtn").classList.remove("active");
  document.getElementById("currentBtn").classList.add("active");
}
</script>
